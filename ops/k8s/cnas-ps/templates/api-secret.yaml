{{/*
=============================================================================
Secret — sensitive API configuration.
=============================================================================
Two render modes:

  1. `vault.enabled: false` (default for staging, NEVER for production):
     renders a plain v1.Secret carrying the values from `secret.inline.*`.
     Operators set these via `--set-file` or via a values overlay that is
     itself stored in a secrets manager — NEVER commit real production
     values to source control (CLAUDE.md §1.8).

  2. `vault.enabled: true`: renders an ExternalSecret
     (external-secrets.io/v1beta1) that points at a (Cluster)SecretStore.
     The operator reconciles the actual Secret object from a remote vault
     (HashiCorp Vault, AWS Secrets Manager, etc.). The keys on the LEFT
     of `vault.remoteKeys` are the .NET env-var paths; values on the
     RIGHT are remote paths in the backing store.

The Secret name is always the same so the Deployment's envFrom never has
to switch references — only the BACKING store changes.

Why a single Secret instead of one Secret per concern? Mounting N Secrets
through envFrom amplifies API-server load (each Secret update reschedules
a watch event) and N kubelet refreshes. One bundled Secret is the
canonical pattern — operators can still rotate individual keys by
re-applying just the changed remote ref.
=============================================================================
*/}}
{{- if .Values.vault.enabled }}
# --- ExternalSecret mode --------------------------------------------------
# CRD requirement: external-secrets.io operator + ClusterSecretStore present.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "cnas-ps.apiSecretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cnas-ps.componentLabels" (dict "ctx" . "component" "api") | nindent 4 }}
spec:
  refreshInterval: {{ .Values.vault.refreshInterval | quote }}
  secretStoreRef:
    name: {{ .Values.vault.secretStoreRef.name }}
    kind: {{ .Values.vault.secretStoreRef.kind }}
  target:
    name: {{ include "cnas-ps.apiSecretName" . }}
    creationPolicy: Owner
  data:
    {{- range $k8sKey, $remoteKey := .Values.vault.remoteKeys }}
    - secretKey: {{ $k8sKey }}
      remoteRef:
        key: {{ $remoteKey }}
    {{- end }}
{{- else }}
# --- Inline-Secret mode ---------------------------------------------------
# Staging / dev only. Production MUST flip vault.enabled=true.
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "cnas-ps.apiSecretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cnas-ps.componentLabels" (dict "ctx" . "component" "api") | nindent 4 }}
type: Opaque
# stringData lets operators paste values as plain text; Kubernetes encodes
# them to data on apply. Using stringData avoids base64-roundtripping every
# overlay file.
stringData:
  # --- Postgres connection string ----------------------------------------
  # Defaults to a synthetic value that references the in-chart Postgres
  # service. Override via `secret.inline.connectionStringsPostgres` to
  # point at an external DB cluster.
  ConnectionStrings__Postgres: {{ default (printf "Host=%s;Port=5432;Database=%s;Username=%s;Password=__OVERRIDE_ME__;SslMode=Require" (include "cnas-ps.postgresRwServiceName" .) .Values.postgres.database .Values.postgres.applicationUsername) .Values.secret.inline.connectionStringsPostgres | quote }}

  # --- Field encryption / hashing (CLAUDE.md §5.7) -----------------------
  # AES-256 master key (base64; 32 raw bytes). Generate:
  #   openssl rand -base64 32
  Cnas__FieldEncryption__Key: {{ .Values.secret.inline.fieldEncryptionKey | quote }}
  # HMAC-SHA256 salt (base64; 32+ raw bytes).
  Cnas__FieldHashing__SaltKey: {{ .Values.secret.inline.fieldHashingSaltKey | quote }}

  # --- MinIO credentials --------------------------------------------------
  # Section name in code is `Minio` (MinioOptions.SectionName), NOT
  # `Cnas:Storage:Minio` — env var prefix must be `Minio__*` to bind.
  Minio__AccessKey: {{ .Values.secret.inline.minioAccessKey | quote }}
  Minio__SecretKey: {{ .Values.secret.inline.minioSecretKey | quote }}
  # MinIO uses its own env-var names internally (MINIO_ROOT_USER / PASSWORD)
  # so the StatefulSet picks them up; the application code reads the
  # Minio__* pair (bound to MinioOptions). We materialize both here so the
  # same Secret can be shared if needed.
  MINIO_ROOT_USER: {{ .Values.secret.inline.minioAccessKey | quote }}
  MINIO_ROOT_PASSWORD: {{ .Values.secret.inline.minioSecretKey | quote }}

  # --- MGov callback HMAC keys ------------------------------------------
  # Anonymous MGov callback endpoints verify these keys in-process before
  # reading or mutating callback state.
  Cnas__CallbackSignatures__MPay__SigningKey: {{ .Values.secret.inline.callbackMpaySigningKey | quote }}
  Cnas__CallbackSignatures__MNotify__SigningKey: {{ .Values.secret.inline.callbackMnotifySigningKey | quote }}
  Cnas__CallbackSignatures__MSign__SigningKey: {{ .Values.secret.inline.callbackMsignSigningKey | quote }}

  # --- MGov mTLS PFX passwords (Cnas:MGov:Mtls:Certificates:<svc>:Password) -
  # The PFX FILES are mounted from a separate Secret (volume mount) — these
  # are the decrypt passwords for those PFX files.
  Cnas__MGov__Mtls__Certificates__msign__Password: {{ .Values.secret.inline.mtlsMsignPassword | quote }}
  Cnas__MGov__Mtls__Certificates__mpay__Password: {{ .Values.secret.inline.mtlsMpayPassword | quote }}
  Cnas__MGov__Mtls__Certificates__mconnect__Password: {{ .Values.secret.inline.mtlsMconnectPassword | quote }}
  Cnas__MGov__Mtls__Certificates__mnotify__Password: {{ .Values.secret.inline.mtlsMnotifyPassword | quote }}
  Cnas__MGov__Mtls__Certificates__mlog__Password: {{ .Values.secret.inline.mtlsMlogPassword | quote }}
  Cnas__MGov__Mtls__Certificates__mdocs__Password: {{ .Values.secret.inline.mtlsMdocsPassword | quote }}
  Cnas__MGov__Mtls__Certificates__mconnect-events__Password: {{ .Values.secret.inline.mtlsMconnectEventsPassword | quote }}
  Cnas__MGov__Mtls__Certificates__mcabinet__Password: {{ .Values.secret.inline.mtlsMcabinetPassword | quote }}

  # --- MPass OIDC client secret ------------------------------------------
  MGov__MPassClientSecret: {{ .Values.secret.inline.mpassClientSecret | quote }}
{{- end }}
