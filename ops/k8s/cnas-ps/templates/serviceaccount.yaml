{{/*
=============================================================================
ServiceAccount + RBAC.
=============================================================================
Three identities are needed in this chart:

  * <release>-cnas-ps (API SA) — no namespace permissions by default. The
    API does not call the Kubernetes API in normal operation; the SA
    exists so audit logs can attribute pod activity to a non-default
    identity (CLAUDE.md §5.4 — deny by default).

  * <release>-cnas-ps-postgres (Patroni SA) — needs CRUD on endpoints
    and configmaps in the release namespace ONLY for Patroni's leader-
    election mechanism (PATRONI_KUBERNETES_USE_ENDPOINTS=true). The Role
    is namespace-scoped so a compromise stays bounded to the data tier
    of one release. NO ClusterRole.

The Patroni RBAC is the minimum the upstream documentation prescribes
for endpoints-based DCS. If you switch to configmaps-based DCS, drop the
endpoints rule.
=============================================================================
*/}}
# --- API ServiceAccount -----------------------------------------------------
{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "cnas-ps.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cnas-ps.componentLabels" (dict "ctx" . "component" "api") | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
# By design, no automountServiceAccountToken: false — the .NET runtime
# needs the token mounted to reach service-bound endpoints if a future
# feature ever uses TokenRequest. We compensate by giving this SA no
# Role/RoleBinding (so the token can do nothing).
{{- end }}
{{- if .Values.postgres.enabled }}
---
# --- Patroni ServiceAccount + Role + RoleBinding --------------------------
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "cnas-ps.postgresName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cnas-ps.componentLabels" (dict "ctx" . "component" "postgres") | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "cnas-ps.postgresName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cnas-ps.componentLabels" (dict "ctx" . "component" "postgres") | nindent 4 }}
rules:
  # Patroni uses the endpoints object as the DCS state store. The "patch"
  # verb is needed to bump the lease annotation on the leader endpoint.
  - apiGroups: [""]
    resources: ["endpoints"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Pods — Patroni reads `role: master/replica` labels from peers to
  # discover the current leader without round-tripping through the DCS.
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "patch"]
  # ConfigMaps — fallback DCS backend. Required even when using endpoints
  # because Spilo writes its dynamic configuration here.
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Services — Patroni updates the rw service selector during failover by
  # patching the master endpoint slice.
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "cnas-ps.postgresName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cnas-ps.componentLabels" (dict "ctx" . "component" "postgres") | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "cnas-ps.postgresName" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "cnas-ps.postgresName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
