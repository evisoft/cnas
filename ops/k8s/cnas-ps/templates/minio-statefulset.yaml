{{/*
=============================================================================
MinIO — object storage workload.
=============================================================================
Two modes gated by `minio.distributed`:

  * distributed: true  (default, staging/prod) → 4-pod StatefulSet with
    erasure coding. MinIO requires ≥4 disks for distributed mode; with
    4 pods × 1 PVC each, parity is N/2 (2 disks of redundancy). This
    survives single-node loss without data loss.

  * distributed: false (dev) → single-pod Deployment. Faster start, no
    erasure coding, no redundancy. NEVER use in production — a single
    pod restart that loses the PVC zeroes the bucket contents.

Both modes mount the SAME credentials Secret (the API Secret carries
MINIO_ROOT_USER and MINIO_ROOT_PASSWORD alongside the application-facing
Cnas__Storage__Minio__AccessKey/SecretKey pair).

securityContext is non-root throughout — the MinIO image supports it as
of RELEASE.2022-01-25.
=============================================================================
*/}}
{{- if .Values.minio.enabled }}
{{- if .Values.minio.distributed }}
# --- Distributed mode: StatefulSet -----------------------------------------
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "cnas-ps.minioName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cnas-ps.componentLabels" (dict "ctx" . "component" "minio") | nindent 4 }}
spec:
  serviceName: {{ include "cnas-ps.minioName" . }}
  replicas: {{ .Values.minio.replicas }}
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      {{- include "cnas-ps.componentSelectorLabels" (dict "ctx" . "component" "minio") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "cnas-ps.componentSelectorLabels" (dict "ctx" . "component" "minio") | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: minio
          image: "{{ .Values.minio.image.repository }}:{{ .Values.minio.image.tag }}"
          imagePullPolicy: {{ .Values.minio.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              drop:
                - ALL
          # Distributed mode is enabled by passing all peer DNS names in
          # the server arg list. The pattern {sts}-{ordinal} resolves via
          # the headless service.
          args:
            - server
            - --console-address
            - ":{{ .Values.minio.consolePort }}"
            {{- range $i, $e := until (int .Values.minio.replicas) }}
            - http://{{ include "cnas-ps.minioName" $ }}-{{ $i }}.{{ include "cnas-ps.minioName" $ }}.{{ $.Release.Namespace }}.svc.cluster.local/data
            {{- end }}
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "cnas-ps.apiSecretName" . }}
                  key: MINIO_ROOT_USER
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "cnas-ps.apiSecretName" . }}
                  key: MINIO_ROOT_PASSWORD
          ports:
            - name: api
              containerPort: {{ .Values.minio.apiPort }}
              protocol: TCP
            - name: console
              containerPort: {{ .Values.minio.consolePort }}
              protocol: TCP
          resources:
            {{- toYaml .Values.minio.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /minio/health/live
              port: api
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /minio/health/ready
              port: api
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: data
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          {{- include "cnas-ps.componentLabels" (dict "ctx" . "component" "minio") | nindent 10 }}
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- if .Values.minio.storageClass }}
        storageClassName: {{ .Values.minio.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.minio.storageSize }}
{{- else }}
# --- Single-pod mode: Deployment (dev only) -------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cnas-ps.minioName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cnas-ps.componentLabels" (dict "ctx" . "component" "minio") | nindent 4 }}
spec:
  replicas: 1
  strategy:
    # Recreate is intentional — distributed mode is OFF so two pods would
    # not be able to share the same /data PVC anyway.
    type: Recreate
  selector:
    matchLabels:
      {{- include "cnas-ps.componentSelectorLabels" (dict "ctx" . "component" "minio") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "cnas-ps.componentSelectorLabels" (dict "ctx" . "component" "minio") | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: minio
          image: "{{ .Values.minio.image.repository }}:{{ .Values.minio.image.tag }}"
          imagePullPolicy: {{ .Values.minio.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
          args:
            - server
            - --console-address
            - ":{{ .Values.minio.consolePort }}"
            - /data
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "cnas-ps.apiSecretName" . }}
                  key: MINIO_ROOT_USER
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "cnas-ps.apiSecretName" . }}
                  key: MINIO_ROOT_PASSWORD
          ports:
            - name: api
              containerPort: {{ .Values.minio.apiPort }}
              protocol: TCP
            - name: console
              containerPort: {{ .Values.minio.consolePort }}
              protocol: TCP
          resources:
            {{- toYaml .Values.minio.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /minio/health/live
              port: api
            initialDelaySeconds: 30
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /minio/health/ready
              port: api
            initialDelaySeconds: 30
            periodSeconds: 10
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          # emptyDir is the dev default — replace with a PVC for any
          # environment where data needs to survive a pod restart.
          emptyDir: {}
{{- end }}
{{- end }}
