server {
    listen 8080 default_server;
    server_name _;

    # Security headers — TOR SEC 010 (OWASP) baseline. CSP intentionally permissive for
    # WASM bootstrap; tighten further once the production origin is known.
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header X-XSS-Protection "0" always;

    root /usr/share/nginx/html;
    index index.html;

    # WASM bundle assets — hashed file names, can be cached for a year.
    location /_framework/ {
        gzip_static on;
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location ~* \.(?:js|css|svg|woff2?|ttf|eot|ico|png|jpg|jpeg|gif)$ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # index.html + runtime config must NOT be cached, otherwise users see stale shells.
    location = /index.html { add_header Cache-Control "no-store, no-cache, must-revalidate" always; }
    location = /appsettings.json { add_header Cache-Control "no-store" always; }
    location = /service-worker.js { add_header Cache-Control "no-store" always; }

    # MIME type for .wasm binaries.
    types {
        application/wasm wasm;
    }

    # SPA fallback — every unmatched URL serves index.html so client-side routing works.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
