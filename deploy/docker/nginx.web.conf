# =============================================================================
# nginx server config for Cnas.Ps.Web (Blazor WebAssembly SPA)
# =============================================================================
# Tuned for a static WASM bundle served by nginx-unprivileged on port 8080.
# Highlights:
#   * SPA fallback: any unmatched URL serves /index.html so client-side
#     routing works.
#   * Long-cache hashed framework assets under /_framework/.
#   * No-cache for index.html / appsettings.json so deployments roll out
#     immediately (clients always re-fetch the shell).
#   * MIME types for .wasm/.dat/.dll added so the browser executes them
#     instead of treating them as octet-streams.
#   * Hardened response headers (baseline OWASP set).
# =============================================================================

# Custom MIME types for Blazor WebAssembly payloads.
types {
    application/wasm                wasm;
    application/octet-stream        dat dll pdb;
}

server {
    listen 8080 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ---- Security headers (OWASP baseline) -----------------------------------
    # CSP intentionally permissive for WASM bootstrap. Tighten via an Ingress
    # or values.yaml override once the production origin is fixed.
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options        DENY     always;
    add_header Referrer-Policy        strict-origin-when-cross-origin always;
    add_header Permissions-Policy     "camera=(), microphone=(), geolocation=()" always;
    add_header X-XSS-Protection       "0"      always;

    # ---- Hashed framework assets: cache aggressively ------------------------
    location /_framework/ {
        gzip_static on;
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # ---- Other static assets ------------------------------------------------
    location ~* \.(?:js|css|svg|woff2?|ttf|eot|ico|png|jpg|jpeg|gif)$ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # ---- Never cache the shell / runtime config -----------------------------
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }
    location = /appsettings.json {
        add_header Cache-Control "no-store" always;
    }
    location = /service-worker.js {
        add_header Cache-Control "no-store" always;
    }

    # ---- SPA fallback -------------------------------------------------------
    # Any unmatched URL is served as /index.html so the Blazor router can
    # resolve client-side routes (deep links, refresh on inner pages, etc.).
    location / {
        try_files $uri $uri/ /index.html;
    }
}
