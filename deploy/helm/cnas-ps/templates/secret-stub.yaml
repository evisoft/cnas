{{/*
=============================================================================
ExternalSecret stub ‚Äî bridges the chart to external-secrets.io.
=============================================================================
Only rendered when `.Values.secrets.externalOperator` is true AND
`.Values.secrets.externalSecretName` is set.

NOTE: NO secret values live in this file. The ExternalSecret CRD pulls real
values from a backing SecretStore (Vault, AWS Secrets Manager, GCP Secret
Manager, Azure Key Vault, etc.) and materialises a Kubernetes Secret named
in `secrets.externalSecretName`. That Secret is then consumed by the API
deployment via `api.envFromSecret`.

If your environment does not use external-secrets, set
`secrets.externalOperator: false` and create the Secret out-of-band.
Idempotent.
=============================================================================
*/}}
{{- if and .Values.secrets.externalOperator .Values.secrets.externalSecretName -}}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ .Values.secrets.externalSecretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cnas-ps.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.secrets.refreshInterval | default "1h" }}
  secretStoreRef:
    name: {{ required "secrets.secretStoreRef.name is required when externalOperator=true" .Values.secrets.secretStoreRef.name }}
    kind: {{ .Values.secrets.secretStoreRef.kind | default "ClusterSecretStore" }}
  target:
    name: {{ .Values.secrets.externalSecretName }}
    creationPolicy: Owner
  data:
    {{- range $k, $v := .Values.secrets.data }}
    - secretKey: {{ $k | quote }}
      remoteRef:
        key: {{ $v.remoteRef.key | quote }}
        {{- with $v.remoteRef.property }}
        property: {{ . | quote }}
        {{- end }}
        {{- with $v.remoteRef.version }}
        version: {{ . | quote }}
        {{- end }}
    {{- end }}
{{- end }}
