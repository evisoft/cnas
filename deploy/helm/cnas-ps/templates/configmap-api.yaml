{{/*
=============================================================================
ConfigMap for the API — non-sensitive environment variables.
=============================================================================
Populated from `.Values.api.env`. Sensitive variables (DB conn strings,
bearer tokens, JWT keys, MinIO secrets) MUST go into a separate K8s Secret
referenced by `.Values.api.envFromSecret` — never inline them here.
This manifest is idempotent: `helm upgrade --install` safely overwrites it.
=============================================================================
*/}}
{{- $cfg := .Values.api.env | default dict -}}
{{- if gt (len $cfg) 0 }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "cnas-ps.apiConfigName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cnas-ps.componentLabels" (dict "ctx" . "component" "api") | nindent 4 }}
  {{- with .Values.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
data:
  {{- range $k, $v := $cfg }}
  {{ $k }}: {{ $v | quote }}
  {{- end }}
{{- end }}
