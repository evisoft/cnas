{{/*
=============================================================================
NetworkPolicy bundle — default-deny + selective allow.
=============================================================================
Only rendered when `.Values.networkPolicy.enabled` is true.
Three policies are produced:
  1. default-deny ingress for all pods labelled with the chart's selector.
  2. allow Ingress-controller traffic to Web pods (port 8080).
  3. allow Web pods + same-namespace pods + listed extra namespaces to
     reach the API on 8080. Egress remains unrestricted (DNS, DB, MGov,
     MinIO etc. are external services) — refine per cluster policy.
Idempotent.
=============================================================================
*/}}
{{- if .Values.networkPolicy.enabled -}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "cnas-ps.fullname" . }}-default-deny
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cnas-ps.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "cnas-ps.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress: []
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "cnas-ps.webName" . }}-allow-ingress
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cnas-ps.componentLabels" (dict "ctx" . "component" "web") | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "cnas-ps.componentSelectorLabels" (dict "ctx" . "component" "web") | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - port: {{ .Values.web.service.targetPort }}
          protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "cnas-ps.apiName" . }}-allow-from-web-and-ns
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cnas-ps.componentLabels" (dict "ctx" . "component" "api") | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "cnas-ps.componentSelectorLabels" (dict "ctx" . "component" "api") | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              {{- include "cnas-ps.componentSelectorLabels" (dict "ctx" . "component" "web") | nindent 14 }}
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Release.Namespace | quote }}
        {{- range .Values.networkPolicy.allowFromNamespaces }}
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ . | quote }}
        {{- end }}
      ports:
        - port: {{ .Values.api.service.targetPort }}
          protocol: TCP
{{- end }}
