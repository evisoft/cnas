{{/*
=============================================================================
ServiceAccount used by API and Web pods.
=============================================================================
Rendered when `.Values.serviceAccount.create` is true. Use a dedicated SA
per release so RBAC bindings can be scoped tightly.
Idempotent.
=============================================================================
*/}}
{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "cnas-ps.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cnas-ps.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: false
{{- end }}
